name: Actualizar Catalogo
on:
  schedule:
    - cron: '*/15 * * * *' # Corre cada hora
  workflow_dispatch: # Botón para correrlo manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Configurar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Instalar librerias
        run: pip install requests
      - name: Ejecutar script
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
        run: python actualizar.py
      - name: Subir cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add index.html
          git commit -m "Web actualizada automaticamente" || exit 0
          git push
